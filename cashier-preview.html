<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.0, user-scalable=0">
<title>收银台 UI 预览</title>
<link href="/assets/css/reset.css" rel="stylesheet" type="text/css">
<link href="/assets/css/main12.css?v=2" rel="stylesheet" type="text/css">
<style>
body.cashier-modern {
    min-height: 100vh;
    padding-bottom: 36px;
    background: #f4f6f8;
    color: #1f2937;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
}
.cashier-modern .w1080 {
    width: min(720px, calc(100% - 28px));
    margin-left: auto;
    margin-right: auto;
}
.cashier-modern .navBD12 {
    border: 0;
    background: #ffffff;
    box-shadow: 0 1px 0 rgba(15, 23, 42, .08);
}
.cashier-modern .nav12 {
    height: 72px;
    padding: 0;
    display: flex;
    align-items: center;
    gap: 18px;
}
.cashier-modern .nav12-left,
.cashier-modern .nav12-right {
    float: none;
    height: auto;
    padding: 0;
    margin: 0;
}
.cashier-modern .nav12-left img {
    max-height: 38px;
    width: auto;
}
.cashier-modern .nav12-right {
    font-size: 24px;
    font-weight: 700;
    color: #111827;
}
.cashier-modern .checkout-card {
    background: #fff;
    border: 1px solid rgba(15, 23, 42, .08);
    border-radius: 8px;
    box-shadow: 0 12px 32px rgba(15, 23, 42, .06);
}
.cashier-modern .order-amount12 {
    width: min(720px, calc(100% - 28px));
    height: auto;
    padding: 0;
    margin-top: 20px;
    overflow: hidden;
}
.cashier-modern .order-summary-head {
    padding: 24px;
    background: #1f2937;
    color: #fff;
    text-align: center;
}
.cashier-modern .order-summary-head .label {
    display: block;
    color: rgba(255,255,255,.72);
    font-size: 13px;
    margin-bottom: 8px;
}
.cashier-modern .order-summary-head strong {
    font-size: 42px;
    line-height: 1;
    font-weight: 700;
    color: #fff;
}
.cashier-modern .order-summary-head small {
    margin-left: 6px;
    font-size: 16px;
    color: rgba(255,255,255,.8);
}
.cashier-modern .amount-note {
    margin-top: 10px;
    color: rgba(255,255,255,.7);
    font-size: 13px;
}
.cashier-modern .order-amount12-left {
    float: none;
    padding: 18px 24px 20px;
}
.cashier-modern .order-amount12-left li {
    display: grid;
    grid-template-columns: 86px 1fr;
    gap: 14px;
    margin: 0;
    padding: 8px 0;
}
.cashier-modern .order-amount12-left span {
    line-height: 1.45;
    font-size: 14px;
    color: #64748b;
    word-break: break-word;
}
.cashier-modern .order-amount12-left span:last-child {
    color: #1f2937;
}
.cashier-modern .PayMethod12 {
    width: min(720px, calc(100% - 28px));
    padding: 24px;
    margin-top: 16px;
}
.cashier-modern .PayMethod12 h2 {
    height: auto;
    line-height: 1.3;
    margin-bottom: 16px;
    font-size: 18px;
    font-weight: 700;
    color: #111827;
}
.cashier-modern .PayMethod12 ul {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
    overflow: visible;
}
.cashier-modern .PayMethod12 ul li {
    float: none;
    width: auto;
    height: 56px;
    margin: 0;
    padding: 0 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    border: 1px solid #dbe3ee;
    border-radius: 10px;
    background: #fff;
    box-sizing: border-box;
    cursor: pointer;
    transition: border-color .18s ease, box-shadow .18s ease, background .18s ease;
}
.cashier-modern .PayMethod12 ul li:hover {
    border-color: #93a4ba;
}
.cashier-modern .PayMethod12 ul li.active {
    border-color: #2563eb;
    background: #f8fbff;
    box-shadow: 0 0 0 3px rgba(37, 99, 235, .12);
}
.cashier-modern .PayMethod12 ul li img {
    float: none;
    width: 26px;
    height: 26px;
    margin: 0;
    object-fit: contain;
}
.cashier-modern .PayMethod12 ul li span {
    float: none;
    color: #111827;
    font-size: 16px;
    font-weight: 600;
}
.cashier-modern .crypto-icon {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex: 0 0 auto;
    background: #26a17b;
    color: #fff;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0;
}
.cashier-modern .crypto-usdc {
    background: #2775ca;
}
.cashier-modern .crypto-trx {
    background: #ef0027;
}
.cashier-modern .immediate-pay12 {
    width: min(720px, calc(100% - 28px));
    height: auto;
    margin-top: 16px;
    padding: 18px 24px;
    box-sizing: border-box;
}
.cashier-modern .immediate-pay12-right {
    float: none;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
}
.cashier-modern .immediate-pay12-right span {
    float: none;
    margin: 0;
    color: #64748b;
    font-size: 15px;
}
.cashier-modern .immediate-pay12-right span strong {
    font-size: 24px;
    color: #dc2626;
}
.cashier-modern .immediate_pay {
    display: block;
    width: 178px;
    height: 52px;
    line-height: 52px;
    border-radius: 8px;
    background: #2563eb;
    color: #fff;
    text-align: center;
    cursor: pointer;
    font-size: 17px;
    font-weight: 700;
    text-decoration: none;
}
.cashier-modern .immediate_pay:hover {
    color: #fff;
    background: #1d4ed8;
}
.cashier-modern .footer12 {
    margin-top: 34px;
    color: #a3aab7;
    text-align: center;
}
@media screen and (max-width: 640px) {
    .cashier-modern {
        padding-bottom: 120px;
    }
    .cashier-modern .nav12 {
        height: 64px;
    }
    .cashier-modern .nav12-left {
        margin-left: 14px;
    }
    .cashier-modern .nav12-right {
        font-size: 21px;
        margin-left: 0;
    }
    .cashier-modern .order-summary-head {
        padding: 20px;
    }
    .cashier-modern .order-summary-head strong {
        font-size: 36px;
    }
    .cashier-modern .order-amount12-left {
        padding: 14px 20px 16px;
    }
    .cashier-modern .order-amount12-left li {
        grid-template-columns: 78px 1fr;
        gap: 10px;
    }
    .cashier-modern .PayMethod12 {
        padding: 22px 20px;
    }
    .cashier-modern .PayMethod12 ul {
        grid-template-columns: 1fr;
    }
    .cashier-modern .immediate-pay12 {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 20;
        width: 100%;
        margin: 0;
        padding: 14px max(14px, env(safe-area-inset-left)) calc(14px + env(safe-area-inset-bottom)) max(14px, env(safe-area-inset-right));
        border-radius: 0;
        border-left: 0;
        border-right: 0;
        border-bottom: 0;
        box-shadow: 0 -10px 28px rgba(15, 23, 42, .1);
    }
    .cashier-modern .immediate-pay12-right {
        gap: 12px;
    }
    .cashier-modern .immediate-pay12-right span {
        font-size: 13px;
    }
    .cashier-modern .immediate-pay12-right span strong {
        font-size: 21px;
    }
    .cashier-modern .immediate_pay {
        width: 138px;
        height: 48px;
        line-height: 48px;
    }
    .cashier-modern .footer12 {
        display: none;
    }
}
</style>
</head>
<body class="cashier-modern">
<div class="w100 navBD12">
    <div class="w1080 nav12">
        <div class="nav12-left">
            <img src="/assets/img/logo.png" alt="Logo">
        </div>
        <div class="nav12-right">收银台</div>
    </div>
</div>

<div class="w1080 order-amount12 checkout-card">
    <div class="order-summary-head">
        <span class="label">订单金额</span>
        <strong>99.00</strong><small>元</small>
        <div class="amount-note">请确认订单信息后选择支付方式</div>
    </div>
    <ul class="order-amount12-left">
        <li>
            <span>商品名称：</span>
            <span>会员套餐 - 月度订阅</span>
        </li>
        <li>
            <span>订单号：</span>
            <span>20260625153000123456</span>
        </li>
        <li>
            <span>创建时间：</span>
            <span>2026-06-25 15:30:00</span>
        </li>
    </ul>
</div>

<div class="w1080 PayMethod12 checkout-card">
    <div class="row">
        <h2>支付方式</h2>
        <ul class="types">
            <li class="active">
                <i class="crypto-icon">UT</i>
                <span>USDT</span>
            </li>
            <li>
                <i class="crypto-icon crypto-usdc">US</i>
                <span>USDC</span>
            </li>
            <li>
                <i class="crypto-icon crypto-trx">TR</i>
                <span>TRX / TRON</span>
            </li>
            <li>
                <img src="/assets/icon/alipay.ico" alt="">
                <span>支付宝</span>
            </li>
            <li>
                <img src="/assets/icon/wxpay.ico" alt="">
                <span>微信支付</span>
            </li>
            <li>
                <img src="/assets/icon/paypal.ico" alt="">
                <span>PayPal</span>
            </li>
        </ul>
    </div>
</div>

<div class="w1080 immediate-pay12 checkout-card">
    <div class="immediate-pay12-right">
        <span>需支付：<strong>99.00</strong>元</span>
        <a class="immediate_pay">立即支付</a>
    </div>
</div>

<div class="w1080 footer12">
    <p>演示支付站点</p>
</div>

<script>
document.querySelectorAll('.types li').forEach(function(item) {
    item.addEventListener('click', function() {
        document.querySelectorAll('.types li').forEach(function(node) {
            node.classList.remove('active');
        });
        item.classList.add('active');
    });
});
</script>
</body>
</html>
